<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFA Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="pitch-bg"></div>
  <div class="pitch-lines">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1000" preserveAspectRatio="xMidYMid meet">
      <!-- Outer boundary -->
      <rect x="20" y="20" width="640" height="960" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" rx="3" ry="3"/>
      <!-- Halfway line -->
      <line x1="20" y1="500" x2="660" y2="500" stroke="rgba(255,255,255,0.30)" stroke-width="2.5"/>
      <!-- Center circle -->
      <circle cx="340" cy="500" r="110" fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="2"/>
      <!-- Center spot -->
      <circle cx="340" cy="500" r="5" fill="rgba(255,255,255,0.40)"/>
      <!-- Top penalty area -->
      <rect x="160" y="20" width="360" height="220" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
      <!-- Bottom penalty area -->
      <rect x="160" y="760" width="360" height="220" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
      <!-- Top goal area -->
      <rect x="230" y="20" width="220" height="80" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
      <!-- Bottom goal area -->
      <rect x="230" y="900" width="220" height="80" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
      <!-- Top penalty spot -->
      <circle cx="340" cy="170" r="4" fill="rgba(255,255,255,0.35)"/>
      <!-- Bottom penalty spot -->
      <circle cx="340" cy="830" r="4" fill="rgba(255,255,255,0.35)"/>
      <!-- Top penalty arc -->
      <path d="M 255 240 A 110 110 0 0 0 425 240" fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="2"/>
      <!-- Bottom penalty arc -->
      <path d="M 255 760 A 110 110 0 0 1 425 760" fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="2"/>
      <!-- Corner arcs -->
      <path d="M 50 20 A 30 30 0 0 1 20 50" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
      <path d="M 630 20 A 30 30 0 0 0 660 50" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
      <path d="M 20 950 A 30 30 0 0 1 50 980" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
      <path d="M 660 950 A 30 30 0 0 0 630 980" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
    </svg>
  </div>

  <div class="container">

    <header>
      <div class="header-top">
        <h1 class="title">SKINNY-DOGS FIFA DASHBOARD</h1>
        <div class="season-badge" id="seasonBadge">
          <span class="season-name">Apertura 2026</span>
          <span class="season-dates">14-abr - 30-jul</span>
        </div>
      </div>
      <div class="pitch-divider"></div>
    </header>

    <section id="cards-section">
      <div class="cards-grid" id="playerCards"></div>
    </section>

    <section id="chart-section">
      <div class="section-header">
        <h2>Evolución</h2>
        <span class="section-icon">📈</span>
      </div>
      <div class="chart-container" id="chartContainer">
        <div class="chart-loader" id="chartLoader">
          <div class="loader-ring"></div>
        </div>
        <canvas id="evolutionChart"></canvas>
      </div>
    </section>

    <section id="partidos-section">
      <div class="section-header">
        <h2>Partidos</h2>
        <span class="section-icon">📋</span>
      </div>
      <div class="matchday-cards" id="matchdayCards"></div>
    </section>

    <section id="aportes-section">
      <div class="section-header">
        <h2>Aportes</h2>
        <span class="section-icon">🔄</span>
      </div>
      <div class="aportes-container" id="aportesContainer"></div>
    </section>

    <footer>
      <p>Hecho para los 3 mosqueteros del FIFA</p>
    </footer>

  </div>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
