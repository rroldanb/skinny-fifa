<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFA Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="pitch-bg"></div>
  <div class="pitch-lines"></div>

  <div class="container">

    <header>
      <div class="header-top">
        <h1 class="title">SKINNY-DOGS FIFA DASHBOARD</h1>
        <div class="season-badge" id="seasonBadge">
          <span class="season-name"></span>
          <span class="season-dates"></span>
        </div>
      </div>
      <div class="pitch-divider"></div>
    </header>

    <section id="cards-section">
      <div class="cards-grid" id="playerCards"></div>
    </section>

    <section id="chart-section">
      <div class="section-header">
        <h2>Evolución</h2>
        <span class="section-icon">📈</span>
      </div>
      <div class="chart-container" id="chartContainer">
        <div class="chart-loader" id="chartLoader">
          <div class="loader-ring"></div>
        </div>
        <canvas id="evolutionChart"></canvas>
      </div>
    </section>

    <section id="results-section">
      <div class="section-header">
        <h2>Resultados por Fecha</h2>
        <span class="section-icon">📋</span>
      </div>
      <div class="table-wrapper">
        <table class="chalk-table" id="resultsTable">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section id="aportes-section">
      <div class="section-header">
        <h2>Aportes</h2>
        <span class="section-icon">🔄</span>
      </div>
      <div class="aportes-container" id="aportesContainer"></div>
    </section>

    <section id="future-section">
      <div class="section-header">
        <h2>Próximamente</h2>
        <span class="section-icon">🚧</span>
      </div>
      <div class="future-grid">
        <div class="future-card" data-feature="equipos">
          <span class="future-icon">⚽</span>
          <span class="future-label">Equipos</span>
          <span class="future-badge">próximamente</span>
        </div>
        <div class="future-card" data-feature="marcadores">
          <span class="future-icon">🥅</span>
          <span class="future-label">Marcadores</span>
          <span class="future-badge">próximamente</span>
        </div>
        <div class="future-card" data-feature="goleadores">
          <span class="future-icon">⭐</span>
          <span class="future-label">Goleadores</span>
          <span class="future-badge">próximamente</span>
        </div>
      </div>
    </section>

    <footer>
      <p>Hecho para los 3 mosqueteros del FIFA</p>
    </footer>

  </div>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
